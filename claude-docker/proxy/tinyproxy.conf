# ─────────────────────────────────────────────────────────────────────────────
# tinyproxy — egress allowlist for the interactive Claude container.
#
# Default-deny: a destination host is reachable ONLY if it matches a pattern in
# /etc/tinyproxy/filter. LAN addresses, other public sites, and everything else
# are refused. This is the whole point of the "no local network" hardening.
# ─────────────────────────────────────────────────────────────────────────────

# Drop privileges after binding the port.
User  tinyproxy
Group tinyproxy

# Listen on all interfaces of the internal `egress` network only. That network
# is `internal: true`, so nothing outside Docker can reach this port.
Port   8888
Listen 0.0.0.0
Timeout 600

LogLevel Info
MaxClients 50

# ── Allowlist ────────────────────────────────────────────────────────────────
# Deny every destination host except those matching the filter file. The filter
# is applied to the destination domain of both plain requests and CONNECT
# tunnels, so an attempt to reach 192.168.x.x / 10.x / a hostname not in the
# list is dropped before any connection is made.
FilterDefaultDeny Yes
Filter "/etc/tinyproxy/filter"
FilterExtended On
FilterCaseSensitive Off

# Only allow HTTPS CONNECT tunnels to 443. No plaintext, no odd ports.
ConnectPort 443

# Any client on the internal network may use the proxy (only the claude
# container is attached to it).
Allow 0.0.0.0/0
