# ─────────────────────────────────────────────────────────────
# Egress allowlist proxy for the Claude Code container.
#
# The claude-code container sits on an internal Docker network
# with no direct internet access. Its only route out is this
# proxy, which permits CONNECT tunnels to the domains listed in
# /etc/tinyproxy/filter (api.anthropic.com) and denies all else.
# ─────────────────────────────────────────────────────────────

Port 8888
Listen 0.0.0.0
Timeout 600
MaxClients 16
LogLevel Notice

# The proxy is only reachable from the internal Docker network,
# so accept connections from any container subnet.
Allow 0.0.0.0/0

# Only HTTPS tunnels are allowed
ConnectPort 443

# Domain allowlist: deny everything not matched in the filter file
FilterType ere
FilterDefaultDeny Yes
Filter "/etc/tinyproxy/filter"
