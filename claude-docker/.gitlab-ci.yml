# ─────────────────────────────────────────────────────────────────────────────
# GitLab CI - Claude Code Blue Zone Pipeline
#
# Required CI/CD Variable (Settings > CI/CD > Variables):
#   CLAUDE_CODE_OAUTH_TOKEN - `claude setup-token` output, Pro/Max
#                             subscription (Masked, Protected)
#
# Blue zone: the folders listed in blue-zone.config.sh (BLUE_ZONE_FOLDERS);
#            default src/, ios/ (source only), android/ (source only)
# Red zone:  .env.*, infra/, signing keys, build artifacts
# ─────────────────────────────────────────────────────────────────────────────

variables:
  DOCKER_BUILDKIT: "1"
  CLAUDE_IMAGE: "claude-code:${CI_COMMIT_SHORT_SHA}"

stages:
  - build
  - validate
  - review

# ─── Build Claude Code Docker image ──────────────────────────────────────────
build-claude-image:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  script:
    - docker build --platform linux/amd64 --tag $CLAUDE_IMAGE --file Dockerfile .
    - docker save $CLAUDE_IMAGE | gzip > claude-image.tar.gz
  artifacts:
    paths:
      - claude-image.tar.gz
    expire_in: 1 hour
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

# ─── Prepare blue zone (rsync filter) ────────────────────────────────────────
prepare-blue-zone:
  stage: validate
  image: alpine:latest
  before_script:
    - apk add --no-cache rsync bash
  script:
    - ./scripts/prepare-blue-zone.sh
  artifacts:
    # Pass filtered blue zone to review jobs
    paths:
      - /tmp/blue-zone/
    expire_in: 1 hour
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

# ─── Validate blue zone (secret scan) ────────────────────────────────────────
validate-blue-zone:
  stage: validate
  image: alpine:latest
  needs: [prepare-blue-zone]
  before_script:
    - apk add --no-cache bash grep git
  script:
    - ./scripts/validate-blue-zone.sh --strict
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

# ─── Claude Code: Security review ────────────────────────────────────────────
claude-security-review:
  stage: review
  image: docker:24
  services:
    - docker:24-dind
  needs: [build-claude-image, validate-blue-zone]
  script:
    - apk add --no-cache bash
    - docker load < claude-image.tar.gz
    # Build the per-folder --volume args and the prompt's target list from
    # blue-zone.config.sh so this job never hardcodes the folder set.
    - |
      bash <<'BASH'
      set -e
      source ./blue-zone.config.sh
      VOLS=()
      TARGETS=""
      for f in "${BLUE_ZONE_FOLDERS[@]}"; do
        VOLS+=(--volume "${BLUE_ZONE_ROOT}/$f:/workspace/$f:ro")
        TARGETS="${TARGETS:+$TARGETS, }/workspace/$f"
      done
      # Staged root files (BLUE_ZONE_ROOT_FILES) — already filtered/validated.
      for rf in ${BLUE_ZONE_ROOT_FILES[@]+"${BLUE_ZONE_ROOT_FILES[@]}"}; do
        [ -f "${BLUE_ZONE_ROOT}/$rf" ] || continue
        VOLS+=(--volume "${BLUE_ZONE_ROOT}/$rf:/workspace/$rf:ro")
        TARGETS="${TARGETS:+$TARGETS, }/workspace/$rf"
      done
      docker run --rm \
        --network none \
        --memory 512m \
        --env CLAUDE_CODE_OAUTH_TOKEN="$CLAUDE_CODE_OAUTH_TOKEN" \
        --env CI=true \
        "${VOLS[@]}" \
        --volume "$(pwd)/.env.example:/workspace/.env.example:ro" \
        --volume "$(pwd)/.claude/CLAUDE.md:/workspace/CLAUDE.md:ro" \
        --workdir /workspace \
        "$CLAUDE_IMAGE" \
          -p "Review all files in $TARGETS for: security vulnerabilities, hardcoded secrets or credentials, and unsafe API usage. Output as JSON: [{file, severity, description}]" \
          --allowedTools "Read" \
          --output-format json \
        | tee claude-security-report.json
      BASH
    - |
      HIGH=$(cat claude-security-report.json | jq -r '.result' | jq '[.[] | select(.severity=="high")] | length' 2>/dev/null || echo "0")
      echo "High severity issues: $HIGH"
      if [ "$HIGH" -gt "0" ]; then
        echo "Claude Code found $HIGH high severity issue(s)."
        exit 1
      fi
  artifacts:
    paths:
      - claude-security-report.json
    expire_in: 7 days
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

# ─── Claude Code: MR diff review ─────────────────────────────────────────────
claude-code-review:
  stage: review
  image: docker:24
  services:
    - docker:24-dind
  needs: [build-claude-image, validate-blue-zone]
  script:
    - apk add --no-cache git bash
    # Diff only the configured blue-zone folders, and build the per-folder
    # --volume args from blue-zone.config.sh so nothing hardcodes the folder set.
    - |
      bash <<'BASH'
      set -e
      source ./blue-zone.config.sh
      PATHSPECS=()
      VOLS=()
      for f in "${BLUE_ZONE_FOLDERS[@]}"; do
        PATHSPECS+=("$f/")
        VOLS+=(--volume "${BLUE_ZONE_ROOT}/$f:/workspace/$f:ro")
      done
      # Staged root files (BLUE_ZONE_ROOT_FILES) — already filtered/validated.
      for rf in ${BLUE_ZONE_ROOT_FILES[@]+"${BLUE_ZONE_ROOT_FILES[@]}"}; do
        PATHSPECS+=("$rf")
        [ -f "${BLUE_ZONE_ROOT}/$rf" ] && VOLS+=(--volume "${BLUE_ZONE_ROOT}/$rf:/workspace/$rf:ro")
      done
      CHANGED=$(git diff --name-only "origin/$CI_DEFAULT_BRANCH...HEAD" \
        -- "${PATHSPECS[@]}" | tr '\n' ' ')
      echo "Changed blue zone files: $CHANGED"
      docker run --rm \
        --network none \
        --memory 512m \
        --env CLAUDE_CODE_OAUTH_TOKEN="$CLAUDE_CODE_OAUTH_TOKEN" \
        --env CI=true \
        "${VOLS[@]}" \
        --volume "$(pwd)/.env.example:/workspace/.env.example:ro" \
        --volume "$(pwd)/.claude/CLAUDE.md:/workspace/CLAUDE.md:ro" \
        --workdir /workspace \
        "$CLAUDE_IMAGE" \
          -p "Review these changed files for bugs, type errors, and best-practice violations: $CHANGED. Be concise and actionable." \
          --allowedTools "Read" \
          --output-format json \
        | tee claude-review-report.json
      BASH
  artifacts:
    paths:
      - claude-review-report.json
    expire_in: 7 days
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
