# ─────────────────────────────────────────────────────────────────────────────
# GitLab CI - Claude Code Blue Zone Pipeline
#
# Required CI/CD Variables (Settings > CI/CD > Variables):
#   ANTHROPIC_API_KEY  - Masked, Protected
#
# Blue zone: src/, ios/ (source only), android/ (source only)
# Red zone:  .env.*, infra/, signing keys, build artifacts
#
# Notes on the docker-in-docker setup:
#   - Artifacts must live under $CI_PROJECT_DIR, so the blue zone is staged
#     at ./blue-zone (BLUE_ZONE_ROOT) instead of /tmp.
#   - Bind mounts (`--volume /path:...`) resolve against the dind daemon's
#     filesystem, NOT the job container, so the workspace is copied into a
#     named volume with `docker cp` and mounted read-only from there.
#   - Claude Code must reach api.anthropic.com, so review jobs run the
#     container on an internal network whose only route out is an
#     allowlist proxy (proxy/) that permits api.anthropic.com:443 only.
# ─────────────────────────────────────────────────────────────────────────────

variables:
  DOCKER_BUILDKIT: "1"
  CLAUDE_IMAGE: "claude-code:${CI_COMMIT_SHORT_SHA}"
  BLUE_ZONE_ROOT: "$CI_PROJECT_DIR/blue-zone"

stages:
  - build
  - validate
  - review

# ─── Build Claude Code Docker image ──────────────────────────────────────────
build-claude-image:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  script:
    - docker build --platform linux/amd64 --tag $CLAUDE_IMAGE --file Dockerfile .
    - docker save $CLAUDE_IMAGE | gzip > claude-image.tar.gz
  artifacts:
    paths:
      - claude-image.tar.gz
    expire_in: 1 hour
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

# ─── Prepare blue zone (rsync filter) ────────────────────────────────────────
prepare-blue-zone:
  stage: validate
  image: alpine:latest
  before_script:
    - apk add --no-cache rsync bash
  script:
    - ./scripts/prepare-blue-zone.sh
  artifacts:
    # Pass filtered blue zone to review jobs (must be inside $CI_PROJECT_DIR)
    paths:
      - blue-zone/
    expire_in: 1 hour
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

# ─── Validate blue zone (secret scan) ────────────────────────────────────────
validate-blue-zone:
  stage: validate
  image: alpine:latest
  needs: [prepare-blue-zone]
  before_script:
    - apk add --no-cache bash grep git
  script:
    - ./scripts/validate-blue-zone.sh --strict
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

# ─── Shared setup for review jobs ────────────────────────────────────────────
# Loads the built image, builds the egress proxy, wires up the internal
# network, and seeds a named volume with the read-only workspace.
.claude-review-setup:
  setup:
    - docker load < claude-image.tar.gz
    - docker build --tag claude-egress-proxy proxy/
    - docker network create --internal claude-internal
    - docker network create claude-egress
    - docker run --detach --name egress-proxy --network claude-egress claude-egress-proxy
    - docker network connect claude-internal egress-proxy
    # Assemble the workspace locally, then copy it into a named volume
    # (bind mounts don't work across the dind boundary).
    - mkdir -p workspace
    - cp -r blue-zone/src blue-zone/ios blue-zone/android workspace/
    - cp blue-zone/BLUE_ZONE_MANIFEST.md package.json tsconfig.json .env.example workspace/
    - cp .claude/CLAUDE.md workspace/CLAUDE.md
    - docker volume create claude-workspace
    - docker create --name seed --volume claude-workspace:/workspace alpine:latest true
    - docker cp workspace/. seed:/workspace/
    - docker rm seed

# ─── Claude Code: Security review ────────────────────────────────────────────
claude-security-review:
  stage: review
  image: docker:24
  services:
    - docker:24-dind
  needs: [build-claude-image, prepare-blue-zone, validate-blue-zone]
  before_script:
    - apk add --no-cache jq
  script:
    - !reference [.claude-review-setup, setup]
    - |
      docker run --rm \
        --network claude-internal \
        --memory 512m \
        --env ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY \
        --env HTTPS_PROXY=http://egress-proxy:8888 \
        --env HTTP_PROXY=http://egress-proxy:8888 \
        --env CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC=1 \
        --env CI=true \
        --volume claude-workspace:/workspace:ro \
        --workdir /workspace \
        $CLAUDE_IMAGE \
          -p "Review all files in /workspace/src, /workspace/ios, and /workspace/android for: security vulnerabilities, hardcoded secrets or credentials, and unsafe API usage. Output ONLY a JSON array, no prose or markdown fences: [{file, severity, description}]" \
          --allowedTools "Read" \
          --output-format json \
        | tee claude-security-report.json
    - |
      # Gate fails CLOSED: unparseable output fails the job instead of
      # silently reporting zero high-severity issues.
      RESULT=$(jq -er '.result' claude-security-report.json) || {
        echo "Could not extract .result from Claude output - failing closed."
        exit 1
      }
      HIGH=$(printf '%s' "$RESULT" | jq '[.[] | select(.severity=="high")] | length') || {
        echo "Claude result was not a valid JSON array - failing closed."
        printf '%s\n' "$RESULT"
        exit 1
      }
      echo "High severity issues: $HIGH"
      if [ "$HIGH" -gt "0" ]; then
        echo "Claude Code found $HIGH high severity issue(s)."
        exit 1
      fi
  artifacts:
    paths:
      - claude-security-report.json
    expire_in: 7 days
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

# ─── Claude Code: MR diff review ─────────────────────────────────────────────
claude-code-review:
  stage: review
  image: docker:24
  services:
    - docker:24-dind
  needs: [build-claude-image, prepare-blue-zone, validate-blue-zone]
  before_script:
    - apk add --no-cache git
  script:
    - !reference [.claude-review-setup, setup]
    - |
      # GitLab clones are shallow and detached; fetch the target branch
      # explicitly so the merge-base diff works.
      git fetch origin $CI_DEFAULT_BRANCH
      CHANGED=$(git diff --name-only origin/$CI_DEFAULT_BRANCH...HEAD \
        -- src/ ios/ android/ | tr '\n' ' ')
      echo "Changed blue zone files: $CHANGED"
      docker run --rm \
        --network claude-internal \
        --memory 512m \
        --env ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY \
        --env HTTPS_PROXY=http://egress-proxy:8888 \
        --env HTTP_PROXY=http://egress-proxy:8888 \
        --env CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC=1 \
        --env CI=true \
        --volume claude-workspace:/workspace:ro \
        --workdir /workspace \
        $CLAUDE_IMAGE \
          -p "Review these changed files for bugs, type errors, and React Native / Swift / Kotlin best practice violations: $CHANGED. Be concise and actionable." \
          --allowedTools "Read" \
          --output-format json \
        | tee claude-review-report.json
  artifacts:
    paths:
      - claude-review-report.json
    expire_in: 7 days
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
