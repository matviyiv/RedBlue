services:
  # ─────────────────────────────────────────────────────────────
  # Headless Claude Code - CI / automated mode
  #
  # Blue zone mounts (writable, pre-filtered by prepare-blue-zone.sh;
  # changes land in /tmp/blue-zone on the host — copy back what you keep,
  # the next prepare run wipes it):
  #     /tmp/blue-zone/src                   -> /workspace/src
  #     /tmp/blue-zone/ios                   -> /workspace/ios
  #     /tmp/blue-zone/android               -> /workspace/android
  #     /tmp/blue-zone/BLUE_ZONE_MANIFEST.md -> /workspace/BLUE_ZONE_MANIFEST.md
  #
  # Red zone - NEVER mounted:
  #     .env.* files
  #     .gitlab-ci.yml
  #     infra/ helm/ k8s/
  #     *-api.ts *Service.ts *Client.ts (stripped by prepare-blue-zone.sh)
  #     ios: *.p12, *.mobileprovision, GoogleService-Info.plist, Pods/, build/
  #     android: *.jks, *.keystore, google-services.json, build/, .gradle/
  # ─────────────────────────────────────────────────────────────
  claude-code:
    build:
      context: .
      dockerfile: Dockerfile
      platforms:
        - linux/amd64
    image: claude-code:latest

    environment:
      # Auth (any ONE is enough):
      #   ANTHROPIC_API_KEY       - Anthropic API key
      #   CLAUDE_CODE_OAUTH_TOKEN - `claude setup-token` (Pro/Max subscription)
      #   neither                 - /login inside the container, persisted in
      #                             the claude-config volume
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN:-}
      - CI=true
      - GITLAB_CI=${GITLAB_CI:-false}

    volumes:
      # Blue zone - pre-filtered copies (writable so Claude can create/edit files)
      - /tmp/blue-zone/src:/workspace/src
      - /tmp/blue-zone/ios:/workspace/ios
      - /tmp/blue-zone/android:/workspace/android

      # Context manifest — auto-generated by prepare-blue-zone.sh
      - /tmp/blue-zone/BLUE_ZONE_MANIFEST.md:/workspace/BLUE_ZONE_MANIFEST.md:ro

      # Config files
      - ./package.json:/workspace/package.json:ro
      - ./tsconfig.json:/workspace/tsconfig.json:ro
      - ./.env.example:/workspace/.env.example:ro
      - ./.claude/CLAUDE.md:/workspace/CLAUDE.md:ro

      # Persisted Claude auth (writable) — keeps /login credentials across runs
      - claude-config:/home/claude/.claude

    working_dir: /workspace
    network_mode: none

    deploy:
      resources:
        limits:
          memory: 512m

  # ─────────────────────────────────────────────────────────────
  # Interactive CLI - local dev only
  # Run: docker compose run --rm claude-cli
  # ─────────────────────────────────────────────────────────────
  claude-cli:
    extends:
      service: claude-code
    network_mode: bridge
    stdin_open: true
    tty: true
    entrypoint: ["claude"]
    command: []

volumes:
  # Stores OAuth credentials from /login so key-less auth survives restarts
  claude-config:
