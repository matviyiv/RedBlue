# ─────────────────────────────────────────────────────────────────────────────
# Blue zone mounts (writable, pre-filtered by prepare-blue-zone.sh; changes land
# in /tmp/blue-zone on the host — sync-back.sh copies back what you keep, the
# next prepare run wipes it).
#
# The actual per-folder mounts are NOT listed here — they are generated from
# blue-zone.config.sh into docker-compose.blue-zone.yml by prepare-blue-zone.sh,
# and layered on via COMPOSE_FILE by start-cli.sh / run-headless.sh. Edit
# blue-zone.config.sh (BLUE_ZONE_FOLDERS) to change which top-level folders are
# mounted — you do not touch this file. With the default config the generated
# mounts are:
#     /tmp/blue-zone/src     -> /workspace/src
#     /tmp/blue-zone/ios     -> /workspace/ios
#     /tmp/blue-zone/android -> /workspace/android
#
# Red zone - NEVER mounted:
#     .env.* files
#     .gitlab-ci.yml
#     infra/ helm/ k8s/
#     *-api.ts *Service.ts *Client.ts (stripped by prepare-blue-zone.sh)
#     ios: *.p12, *.mobileprovision, GoogleService-Info.plist, Pods/, build/
#     android: *.jks, *.keystore, google-services.json, build/, .gradle/
#
# Network model:
#     claude-code (headless / CI)  -> network_mode: none        (no network)
#     claude-cli  (interactive)    -> internal `egress` network, reaches ONLY
#                                     the egress-proxy allowlist. No LAN access.
# ─────────────────────────────────────────────────────────────────────────────

# Shared configuration for both Claude services (build, image, mounts, limits).
# Each service adds its own network config and environment below.
x-claude-common: &claude-common
  build:
    context: .
    dockerfile: Dockerfile
  # Build/run for the host's native architecture by default (empty = unset), so
  # Apple Silicon (arm64) machines don't hit the "platform (linux/amd64) does
  # not match the detected host platform (linux/arm64)" mismatch and slow QEMU
  # emulation. Pin a specific arch when you need it: CLAUDE_PLATFORM=linux/amd64.
  platform: ${CLAUDE_PLATFORM:-}
  image: claude-code:latest
  volumes:
    # Blue zone - pre-filtered per-folder copies are added by the generated
    # docker-compose.blue-zone.yml overlay (from blue-zone.config.sh), not here.

    # Config files
    - ./package.json:/workspace/package.json:ro
    - ./tsconfig.json:/workspace/tsconfig.json:ro
    - ./.env.example:/workspace/.env.example:ro
    - ./.claude/CLAUDE.md:/workspace/CLAUDE.md:ro

    # Persisted Claude state (writable) — the WHOLE home dir, because Claude
    # Code keeps onboarding/session state in ~/.claude.json (not inside
    # ~/.claude/). Keeps login, settings, and session history across runs.
    # Clear with: ./scripts/start-cli.sh --clear
    - claude-home:/home/claude
  working_dir: /workspace
  deploy:
    resources:
      limits:
        memory: 512m

services:
  # ─────────────────────────────────────────────────────────────
  # Headless Claude Code - CI / automated mode. No network at all.
  # ─────────────────────────────────────────────────────────────
  claude-code:
    <<: *claude-common
    environment:
      # Auth (any ONE is enough):
      #   CLAUDE_CODE_OAUTH_TOKEN - `claude setup-token` (Pro/Max subscription)
      #   neither                 - /login inside the container, persisted in
      #                             the claude-home volume
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN:-}
      - CI=true
      - GITLAB_CI=${GITLAB_CI:-false}
    network_mode: none

  # ─────────────────────────────────────────────────────────────
  # Interactive CLI - local dev only.
  # Run: docker compose run --rm claude-cli
  #
  # Attached ONLY to the internal `egress` network, so it has no route to your
  # LAN or the wider internet. Its sole path out is the egress-proxy, which
  # allowlists Anthropic domains — enough to authenticate and call the API,
  # nothing more. Even if a process ignored the proxy env vars, the internal
  # network has no gateway to reach 192.168.x.x / 10.x / the host.
  # ─────────────────────────────────────────────────────────────
  claude-cli:
    <<: *claude-common
    environment:
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN:-}
      - CI=true
      - GITLAB_CI=${GITLAB_CI:-false}
      # Force all outbound HTTP(S) through the allowlist proxy.
      - HTTP_PROXY=http://egress-proxy:8888
      - HTTPS_PROXY=http://egress-proxy:8888
      - http_proxy=http://egress-proxy:8888
      - https_proxy=http://egress-proxy:8888
      - NO_PROXY=localhost,127.0.0.1
      - no_proxy=localhost,127.0.0.1
    stdin_open: true
    tty: true
    entrypoint: ["claude"]
    command: []
    networks:
      - egress
    depends_on:
      - egress-proxy

  # ─────────────────────────────────────────────────────────────
  # Egress allowlist proxy — the ONLY component that can reach the
  # outside world. Dual-homed: `egress` (talks to claude-cli) and
  # `upstream` (reaches Anthropic). See proxy/ for the allowlist.
  # ─────────────────────────────────────────────────────────────
  egress-proxy:
    build:
      context: ./proxy
      dockerfile: Dockerfile
    image: claude-egress-proxy:latest
    # Mount the config over the image's baked-in copy so editing the allowlist
    # takes effect on the next session — no image rebuild required.
    volumes:
      - ./proxy/tinyproxy.conf:/etc/tinyproxy/tinyproxy.conf:ro
      - ./proxy/filter:/etc/tinyproxy/filter:ro
    networks:
      - egress
      - upstream
    deploy:
      resources:
        limits:
          memory: 64m

networks:
  # No gateway to the host/LAN/internet. claude-cli lives here and can only
  # reach other containers on this network (i.e. the proxy).
  egress:
    internal: true
  # Normal bridge — only the proxy is attached, giving it (and only it)
  # outbound internet access to the allowlisted Anthropic domains.
  upstream:
    driver: bridge

volumes:
  # Persists /login credentials, onboarding answers (~/.claude.json), and
  # session history so nothing is asked twice. Remove to start fresh:
  # ./scripts/start-cli.sh --clear   (or: docker compose down -v)
  claude-home:
