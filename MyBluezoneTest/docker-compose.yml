# ─────────────────────────────────────────────────────────────
# Claude Code blue zone environment
#
# Claude Code needs to reach api.anthropic.com to function, so a
# fully offline container (network_mode: none) is impossible.
# Instead the claude containers live on an INTERNAL Docker network
# with no route to the internet; the egress-proxy is their only
# way out, and it only allows CONNECT to api.anthropic.com:443
# (see proxy/filter). Everything else is denied.
# ─────────────────────────────────────────────────────────────

x-claude-base: &claude-base
  build:
    context: .
    dockerfile: Dockerfile
    platforms:
      - linux/amd64
  image: claude-code:latest

  depends_on:
    - egress-proxy

  environment:
    - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    - CI=true
    - GITLAB_CI=${GITLAB_CI:-false}
    # All traffic must go through the allowlist proxy — the
    # internal network has no other route to the internet.
    - HTTPS_PROXY=http://egress-proxy:8888
    - HTTP_PROXY=http://egress-proxy:8888
    # Disable telemetry/update traffic so api.anthropic.com is
    # the only endpoint Claude Code needs.
    - CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC=1

  # Blue zone mounts (read-only, pre-filtered by prepare-blue-zone.sh)
  #
  # Red zone - NEVER mounted:
  #     .env.* files
  #     .gitlab-ci.yml
  #     infra/ helm/ k8s/
  #     *-api.ts *Service.ts *Client.ts (stripped by prepare-blue-zone.sh)
  #     ios: *.p12, *.mobileprovision, GoogleService-Info.plist, Pods/, build/
  #     android: *.jks, *.keystore, google-services.json, build/, .gradle/
  volumes:
    # Blue zone - pre-filtered copies (read-only)
    - ${BLUE_ZONE_ROOT:-/tmp/blue-zone}/src:/workspace/src:ro
    - ${BLUE_ZONE_ROOT:-/tmp/blue-zone}/ios:/workspace/ios:ro
    - ${BLUE_ZONE_ROOT:-/tmp/blue-zone}/android:/workspace/android:ro

    # Context manifest — auto-generated by prepare-blue-zone.sh
    - ${BLUE_ZONE_ROOT:-/tmp/blue-zone}/BLUE_ZONE_MANIFEST.md:/workspace/BLUE_ZONE_MANIFEST.md:ro

    # Config files
    - ./package.json:/workspace/package.json:ro
    - ./tsconfig.json:/workspace/tsconfig.json:ro
    - ./.env.example:/workspace/.env.example:ro
    - ./.claude/CLAUDE.md:/workspace/CLAUDE.md:ro

  working_dir: /workspace
  networks:
    - claude-internal

  deploy:
    resources:
      limits:
        memory: 512m

services:
  # ─────────────────────────────────────────────────────────────
  # Egress allowlist proxy — the only container with internet access
  # ─────────────────────────────────────────────────────────────
  egress-proxy:
    build:
      context: ./proxy
    image: claude-egress-proxy:latest
    networks:
      - claude-internal
      - egress
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────
  # Headless Claude Code - CI / automated mode
  # ─────────────────────────────────────────────────────────────
  claude-code:
    <<: *claude-base

  # ─────────────────────────────────────────────────────────────
  # Interactive CLI - local dev only
  # Run: docker compose run --rm claude-cli
  # Same internal network + egress proxy as the headless service.
  # ─────────────────────────────────────────────────────────────
  claude-cli:
    <<: *claude-base
    stdin_open: true
    tty: true
    entrypoint: ["claude"]
    command: []

networks:
  # No internet route — containers here can only talk to each other.
  claude-internal:
    internal: true
  # Only the egress proxy is attached to this network.
  egress:
